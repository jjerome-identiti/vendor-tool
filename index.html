<!DOCTYPE html>
<html lang="en" style="height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Selection Tool — KFM 24/7</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ── Dark mode (default) ── */
  :root {
    --ink: #e2e8f0;
    --ink-strong: #f1f5f9;
    --ink-2: #cbd5e1;
    --line: #1f2937;
    --line-2: #374151;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-2: #60a5fa;
    --ok: #22c55e;
    --warn: #FFCC00;
    --bad: #ef4444;
    --bg: #0a0e1a;
    --bg-2: #131927;
    --bg-3: #1c2333;
    --green-sm: #14532d;
    --green-sm-border: #16a34a;
    --green-sm-text: #4ade80;
  }
  /* ── Light mode overrides ── */
  body.light-mode {
    --ink: #1e293b;
    --ink-strong: #0f172a;
    --ink-2: #334155;
    --line: #cbd5e1;
    --line-2: #94a3b8;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-2: #3b82f6;
    --ok: #16a34a;
    --warn: #997A00;
    --bad: #dc2626;
    --bg: #f1f5f9;
    --bg-2: #ffffff;
    --bg-3: #e8eef4;
    --green-sm: #dcfce7;
    --green-sm-border: #16a34a;
    --green-sm-text: #15803d;
  }
  body.light-mode .topbar {
    background: linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%);
  }
  body.light-mode .rank-badge { box-shadow:0 0 8px rgba(37,99,235,.35); }
  body.light-mode .card:hover { box-shadow:0 3px 14px rgba(0,0,0,.12); }
  body.light-mode input, body.light-mode select { background:#f8fafc; color:#1e293b; }
  body.light-mode input::placeholder { color:#94a3b8; }
  body.light-mode .leaflet-container { background:#e8eef4; }
  body.light-mode .leaflet-popup-content-wrapper,
  body.light-mode .leaflet-popup-tip { background:#fff; color:#1e293b; border-color:#cbd5e1; }
  body.light-mode .leaflet-control-attribution { background:rgba(241,245,249,.9)!important; color:#475569!important; }
  body.light-mode .leaflet-bar a { background:#fff!important; color:#1e293b!important; border-bottom-color:#cbd5e1!important; }
  body.light-mode .leaflet-bar a:hover { background:#f1f5f9!important; }
  body.light-mode button:not(.btn-primary):not(.leaflet-control button) { background:#e8eef4; color:#1e293b; border-color:#94a3b8; }
  body.light-mode button:not(.btn-primary):hover { background:#dde6f0; border-color:#64748b; }
  body.light-mode .ms-dropdown { background:#fff; border-color:#cbd5e1; box-shadow:0 8px 24px rgba(0,0,0,.12); }
  body.light-mode .ms-item:hover { background:#f1f5f9; }
  body.light-mode .ms-trigger { background:#f8fafc; color:#1e293b; border-color:#94a3b8; }
  body.light-mode .autocomplete-list { background:#fff; border-color:#cbd5e1; box-shadow:0 8px 24px rgba(0,0,0,.12); }
  body.light-mode .autocomplete-item { color:#1e293b; border-bottom-color:#e2e8f0; }
  body.light-mode .autocomplete-item:hover { background:#f1f5f9; }

  /* ── Light mode: pills ── */
  body.light-mode .pill-ok     { background:#dcfce7; color:#15803d; border-color:#86efac; }
  body.light-mode .pill-bad    { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }
  body.light-mode .pill-warn   { background:#fffbe6; color:#7a5c00; border-color:#FFCC00; }
  body.light-mode .pill-muted  { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
  body.light-mode .pill-info   { background:#dbeafe; color:#1d4ed8; border-color:#93c5fd; }
  body.light-mode .pill-green  { background:#dcfce7; color:#15803d; border-color:#86efac; }
  body.light-mode .pill-yellow { background:#fefce8; color:#854d0e; border-color:#fde68a; }
  body.light-mode .pill-orange { background:#ffedd5; color:#9a3412; border-color:#fdba74; }
  body.light-mode .pill-red    { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }

  /* ── Light mode: alerts ── */
  body.light-mode .alert-severe  { background:#fee2e2; border-left-color:#dc2626; color:#7f1d1d; }
  body.light-mode .alert-caution { background:#fffbe6; border-left-color:#997A00; color:#5c4400; }
  body.light-mode .alert-info { background:#f1f5f9; border-left-color:#64748b; color:#334155; }
  body.light-mode .pill-neutral { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
  body.light-mode .pill-purple { background:#ede9fe; color:#6d28d9; border-color:#c4b5fd; }

  /* ── Light mode: self-managed card ── */
  body.light-mode .card-title-bar.self-managed-bar { background:linear-gradient(90deg,rgba(220,252,231,.85),rgba(187,247,208,.6)); border-bottom-color:rgba(22,163,74,.4); }
  body.light-mode .card-title-bar.self-managed-bar > div:last-child { color:#15803d !important; }
  body.light-mode .rank-badge { color:#ffffff !important; }
  body.light-mode .rank-badge.sm { background:linear-gradient(135deg,#16a34a,#14532d); }
  html, body { height:100%; overflow:hidden; margin:0; padding:0; }
  body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); display:flex; flex-direction:column; }
  .topbar { background: linear-gradient(135deg,#050912 0%,#0f1d3d 50%,#1e3a8a 100%); border-bottom: 1px solid #1f2937; flex-shrink:0; }
  /* ── Layout ── */
  .top-controls { flex-shrink:0; padding:8px 12px 0; display:flex; flex-direction:column; gap:6px; }
  .info-bar { flex-shrink:0; padding:4px 12px; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; background:var(--bg-3); border-bottom:1px solid var(--line); border-top:1px solid var(--line); }
  #layout-root { flex:1; min-height:0; display:flex; flex-direction:column; }
  .content-area { flex:1; min-height:0; display:flex; flex-direction:row; overflow:hidden; }
  #list-section { flex:0 0 60%; width:60%; display:flex; flex-direction:column; border-right:1px solid var(--line); min-width:0; overflow:hidden; }
  .list-panel-scroll { flex:1; min-height:0; overflow-y:scroll; -webkit-overflow-scrolling:touch; touch-action:pan-y; padding:6px 10px 12px; }
  #map-section { flex:1; position:relative; min-width:0; transition:flex .3s ease, width .3s ease; }
  #map-section #map { position:absolute; inset:0; border-radius:0; }
  /* Map collapsed state */
  #layout-root.map-collapsed #list-section { flex:0 0 100%; width:100%; border-right:none; }
  #layout-root.map-collapsed #map-section { flex:0 0 0; width:0; overflow:hidden; min-width:0; }
  /* Map collapse toggle button */
  .map-collapse-btn { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,.08); border:1px solid var(--line-2); border-radius:6px; padding:3px 10px; font-size:10.5px; font-weight:600; color:var(--ink-2); cursor:pointer; white-space:nowrap; transition:all .15s; flex-shrink:0; }
  .map-collapse-btn:hover { background:rgba(59,130,246,.15); border-color:#3b82f6; color:#60a5fa; }
  body.light-mode .map-collapse-btn { background:rgba(0,0,0,.06); border-color:#94a3b8; color:#475569; }
  body.light-mode .map-collapse-btn:hover { background:rgba(37,99,235,.1); border-color:#2563eb; color:#2563eb; }

  /* Light/dark toggle button */
  .theme-toggle-btn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#e2e8f0; border-radius:6px; padding:4px 10px; font-size:11px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:all .15s; white-space:nowrap; }
  .theme-toggle-btn:hover { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); }
  body.light-mode .theme-toggle-btn { background:rgba(0,0,0,.08); border-color:rgba(0,0,0,.2); color:#1e293b; }
  body.light-mode .theme-toggle-btn:hover { background:rgba(0,0,0,.14); }

  /* Responsive */
  /* ── Tablet / narrow desktop ── */
  @media (max-width:900px) {
    .content-area { flex-direction:column; }
    #list-section { flex:1; width:100%; border-right:none; border-top:1px solid var(--line); }
    #map-section { height:260px; flex-shrink:0; order:-1; }
    #map-section #map { position:relative; height:100%; }
  }
  /* ── Mobile ── */
  @media (max-width:640px) {
    /* ── Full page scroll ── */
    html { height:auto !important; overflow-y:auto !important; }
    body { height:auto !important; overflow-y:visible !important; display:block !important; padding-top:80px; }
    header.topbar { position:fixed !important; top:0; left:0; right:0; z-index:500; }
    /* Keep flex column so order:-1 still works for map-above-list */
    #layout-root { flex:none !important; height:auto !important; min-height:0 !important; }
    .content-area { flex-direction:column !important; height:auto !important; overflow:visible !important; }
    #list-section { flex:none !important; height:auto !important; overflow:visible !important; width:100% !important; border-right:none !important; border-top:1px solid var(--line); }
    .list-panel-scroll { overflow-y:visible !important; height:auto !important; flex:none !important; min-height:0 !important; }
    /* Map above list */
    #map-section { order:-1 !important; height:220px; flex-shrink:0 !important; }
    #map-section #map { position:relative !important; height:220px !important; width:100% !important; }
    #layout-root.map-collapsed #map-section { visibility:hidden !important; height:0 !important; overflow:hidden !important; flex:none !important; margin:0 !important; padding:0 !important; }
    #load-more-wrap { padding:6px 8px 24px; }

    /* ── Compact banner: logo + centered title on row 1, button left on row 2 ── */
    .topbar > div { padding:.25rem .6rem; min-height:auto; gap:.1rem .4rem; flex-wrap:wrap !important; align-items:center; }
    .topbar > div > div:first-child { flex:0 0 auto; align-self:center; }
    .topbar > div > div:first-child img { height:30px; width:auto; }
    .topbar h1 { flex:1 1 auto; font-size:1.15rem !important; text-align:center !important; white-space:normal !important; line-height:1.25; min-width:0; }
    .topbar > div > div:last-child { flex:0 0 100% !important; width:100% !important; display:flex !important; justify-content:flex-end !important; }

    /* ── Other ── */
    #search-row { flex-direction:column !important; }
    #filters-row { flex-wrap:nowrap !important; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
    #filters-row::-webkit-scrollbar { height:3px; }
    #filters-row > * { flex-shrink:0; }
    .ms-dropdown.open { z-index:99999 !important; }
    .top-controls { padding:6px 8px 0; gap:5px; }
    .top-controls .card { padding:6px 10px !important; }
    .info-bar { padding:3px 8px; gap:4px; font-size:10px; }
    #data-stats { display:none !important; }
    input, select, textarea { font-size:16px !important; }
    .ms-trigger { padding:5px 22px 5px 8px; font-size:11px; }
    .ms-item { padding:8px 10px; }
    .autocomplete-list { max-height:180px; }
    /* Date input fits on screen */
    #eta-date-input { width:100% !important; max-width:100% !important; box-sizing:border-box !important; font-size:14px !important; padding:5px 6px !important; min-width:0 !important; -webkit-appearance:none; appearance:none; }
    #search-row > div:nth-child(2) { min-width:0 !important; overflow:hidden !important; }
  }
  .pill { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:999px; font-size:9px; font-weight:600; }
  .pill-ok { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.3); }
  .pill-bad { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.3); }
  .pill-warn { background:rgba(255,204,0,.12); color:#FFCC00; border:1px solid rgba(255,204,0,.35); }
  .pill-muted { background:rgba(148,163,184,.12); color:#cbd5e1; border:1px solid rgba(148,163,184,.2); }
  .pill-info { background:rgba(59,130,246,.15); color:#93c5fd; border:1px solid rgba(59,130,246,.3); }
  .pill-green { background:rgba(22,163,74,.2); color:#4ade80; border:1px solid rgba(22,163,74,.4); }
  .pill-yellow { background:rgba(234,179,8,.15); color:#fde047; border:1px solid rgba(234,179,8,.3); }
  .pill-orange { background:rgba(249,115,22,.15); color:#fb923c; border:1px solid rgba(249,115,22,.3); }
  .pill-red { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.3); }
  .card { background:var(--bg-2); border:1px solid var(--line); border-radius:10px; transition:all .15s; color:var(--ink); }
  .card:hover { border-color:#334155; box-shadow:0 3px 18px rgba(0,0,0,.4); }
  .card.self-managed { border-color:var(--green-sm-border)!important; }
  .rank-badge { background:linear-gradient(135deg,#3b82f6,#1e40af); color:white; font-weight:700; box-shadow:0 0 10px rgba(59,130,246,.4); }
  .rank-badge.sm { background:linear-gradient(135deg,#16a34a,#14532d); box-shadow:0 0 10px rgba(22,163,74,.4); }
  .card-title-bar { border-radius:8px 8px 0 0; padding:5px 8px; display:flex; align-items:center; gap:6px; }
  .card-title-bar.normal { background:rgba(30,35,51,0.6); }
  .card-title-bar.self-managed-bar { background:linear-gradient(90deg,rgba(20,83,45,.85),rgba(22,101,52,.6)); border-bottom:1px solid rgba(22,163,74,.3); }
  .card-title-bar.sa-loc-bar { background:linear-gradient(90deg,rgba(120,80,0,.85),rgba(161,122,8,.6)); border-bottom:1px solid rgba(234,179,8,.4); }
  body.light-mode .card-title-bar.sa-loc-bar { background:linear-gradient(90deg,rgba(254,243,199,.9),rgba(253,230,138,.6)); border-bottom-color:rgba(202,138,4,.4); }
  body.light-mode .card-title-bar.sa-loc-bar > div:last-child { color:#92400e !important; }
  .rank-badge.sa-loc { background:linear-gradient(135deg,#d97706,#92400e); box-shadow:0 0 10px rgba(217,119,6,.5); }
  .custom-marker.sa-loc { border-color:#f59e0b; color:#fde047; background:#1c1812; }
  .custom-marker.sa-loc::after { content:'⭐'; position:absolute; top:-10px; right:-8px; font-size:10px; }
  .card-body { padding:5px 8px 7px; }
  .alert-severe { background:rgba(239,68,68,.1); border-left:3px solid #ef4444; color:#fecaca; }
  .alert-caution { background:rgba(255,204,0,.08); border-left:3px solid #FFCC00; color:#FFCC00; }
  .alert-info { background:rgba(148,163,184,.1); border-left:3px solid #64748b; color:#cbd5e1; }
  .pill-neutral { background:rgba(148,163,184,.12); color:#cbd5e1; border:1px solid rgba(148,163,184,.2); }
  .pill-purple { background:rgba(139,92,246,.15); color:#c4b5fd; border:1px solid rgba(139,92,246,.3); }
  input, select { background:var(--bg-3); color:var(--ink); border-color:var(--line-2)!important; }
  input::placeholder { color:#64748b; }
  select option { background:var(--bg-2); color:var(--ink); }
  input:focus, select:focus { outline:2px solid #3b82f6; outline-offset:0; border-color:#3b82f6!important; }
  button:not(.btn-primary):not(.leaflet-control button) { background:var(--bg-3); color:var(--ink-strong); border:1px solid var(--line-2); }
  button:not(.btn-primary):hover { background:#243047; border-color:#475569; }
  button, .ms-trigger, .ms-item { touch-action:manipulation; }
  .btn-primary { background:linear-gradient(135deg,#3b82f6,#1e40af); color:white; border:1px solid #3b82f6; }
  .btn-primary:hover { filter:brightness(1.1); box-shadow:0 0 12px rgba(59,130,246,.4); }
  .leaflet-container { font-family:inherit; border-radius:10px; background:#0a0e1a; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip { background:var(--bg-2); color:var(--ink); border:1px solid var(--line); }
  .leaflet-control-attribution { background:rgba(10,14,26,.85)!important; color:#94a3b8!important; }
  .leaflet-control-attribution a { color:#93c5fd!important; }
  .leaflet-bar a { background:var(--bg-2)!important; color:var(--ink)!important; border-bottom-color:var(--line)!important; }
  .leaflet-bar a:hover { background:var(--bg-3)!important; }
  .custom-marker { position:relative; background:var(--bg-2); border:2px solid #3b82f6; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-weight:700; color:#93c5fd; font-size:11px; box-shadow:0 2px 8px rgba(0,0,0,.5); }
  .custom-marker.sm { border-color:#16a34a; color:#4ade80; background:#0c1a0f; }
  .custom-marker.severe { border-color:#ef4444; color:#fca5a5; background:#1c1014; }
  .custom-marker.caution { border-color:#FFCC00; color:#FFCC00; background:#1c1812; }
  .custom-marker.target { background:#ef4444; border-color:white; color:white; width:34px; height:34px; font-size:16px; box-shadow:0 0 18px rgba(239,68,68,.6); }
  /* SA match styles */
  .sa-badge-today-loc  { background:rgba(234,179,8,.3);  color:#fde047; border:1px solid rgba(234,179,8,.6); font-weight:800; }
  .sa-badge-today-area { background:rgba(249,115,22,.2); color:#fb923c; border:1px solid rgba(249,115,22,.4); font-weight:800; }
  body.light-mode .sa-badge-today-loc  { background:#fefce8; color:#854d0e; border-color:#fde068; }
  body.light-mode .sa-badge-today-area { background:#fff7ed; color:#9a3412; border-color:#fdba74; }
  .sa-row.today { background:rgba(22,163,74,.18) !important; border-left-width:3px !important; border-left-color:#22c55e !important; }
  .sa-today-label { color:#4ade80; font-weight:800; font-size:9px; text-transform:uppercase; letter-spacing:.05em; }
  .sa-gap-banner { background:rgba(59,130,246,.08); border:1px solid rgba(59,130,246,.25); border-radius:8px; padding:8px 12px; margin-bottom:8px; font-size:11px; color:var(--ink-2); display:flex; flex-direction:column; gap:3px; }
  .sa-gap-banner .gap-title { font-weight:700; color:var(--ink-strong); font-size:11.5px; }
  .sa-gap-banner .gap-nearest { color:var(--muted); font-size:10.5px; }
  body.light-mode .sa-gap-banner { background:rgba(219,234,254,.4); border-color:rgba(59,130,246,.3); }
  .sa-badge-loc  { background:rgba(234,179,8,.2);  color:#fde047; border:1px solid rgba(234,179,8,.4); }
  .sa-badge-area { background:rgba(20,184,166,.15); color:#2dd4bf; border:1px solid rgba(20,184,166,.3); }
  body.light-mode .sa-badge-loc  { background:#fefce8; color:#854d0e; border-color:#fde68a; }
  body.light-mode .sa-badge-area { background:#f0fdfa; color:#0f766e; border-color:#99f6e4; }
  .sa-section { margin-top:4px; border-top:1px solid var(--line); padding-top:4px; }
  .sa-row { display:flex; flex-direction:column; gap:1px; padding:3px 6px; border-radius:4px; font-size:9.5px; background:rgba(22,163,74,.08); border-left:2px solid #16a34a; margin-bottom:3px; }
  .sa-row.loc { background:rgba(22,163,74,.12); border-left-color:#22c55e; }
  .sa-row a { color:#4ade80; text-decoration:underline; }
  .sa-row.loc a { color:#4ade80; }
  body.light-mode .sa-row a { color:#15803d; }
  body.light-mode .sa-row.loc a { color:#15803d; }
  .vns-match-item { padding:6px 10px; cursor:pointer; font-size:11.5px; border-bottom:1px solid var(--line); display:flex; flex-direction:column; gap:1px; }
  .vns-match-item:hover, .vns-match-item.vns-active { background:var(--bg-3); }
  .vns-match-name { color:var(--ink-strong); font-weight:600; }
  .vns-match-sub { color:var(--muted); font-size:10px; }
  .autocomplete-list { position:absolute; top:100%; left:0; right:0; background:var(--bg-2); border:1px solid var(--line-2); border-radius:8px; margin-top:4px; box-shadow:0 12px 32px rgba(0,0,0,.6); z-index:2000; max-height:260px; overflow-y:auto; color:var(--ink); }
  .autocomplete-item { padding:7px 11px; cursor:pointer; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink); }
  .autocomplete-item:hover, .autocomplete-item.active { background:var(--bg-3); }
  .autocomplete-item:last-child { border-bottom:none; }
  /* Multi-select dropdown */
  .ms-wrap { position:relative; display:inline-block; }
  .ms-trigger { background:var(--bg-3); color:var(--ink); border:1px solid var(--line-2); border-radius:5px; padding:3px 22px 3px 7px; font-size:11px; cursor:pointer; white-space:nowrap; min-width:120px; max-width:180px; overflow:hidden; text-overflow:ellipsis; display:inline-block; position:relative; }
  .ms-trigger::after { content:"▾"; position:absolute; right:6px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:10px; }
  .ms-trigger.active { border-color:#3b82f6; }
  .ms-dropdown { display:none; position:absolute; top:calc(100% + 3px); left:0; z-index:9999; background:var(--bg-2); border:1px solid var(--line-2); border-radius:8px; box-shadow:0 10px 28px rgba(0,0,0,.6); z-index:3000; min-width:180px; max-height:260px; overflow-y:auto; }
  .ms-dropdown.open { display:block; }
  .ms-item { display:flex; align-items:center; gap:7px; padding:5px 10px; cursor:pointer; font-size:11px; color:var(--ink); border-bottom:1px solid rgba(255,255,255,.04); }
  .ms-item:hover { background:var(--bg-3); }
  .ms-item input[type=checkbox] { width:13px; height:13px; accent-color:#3b82f6; flex-shrink:0; cursor:pointer; }
  .ms-search-wrap { padding:5px 8px 4px; border-bottom:1px solid var(--line); }
  .ms-search { width:100%; box-sizing:border-box; background:var(--bg-3); border:1px solid var(--line-2); border-radius:5px; padding:4px 8px; font-size:11px; color:var(--ink); }
  .ms-search:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 1px #3b82f6; }
  .ms-search::placeholder { color:#64748b; }
  .ms-clear { padding:4px 10px; font-size:10px; color:var(--accent-2); cursor:pointer; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .ms-clear:hover { color:white; }
  /* Scrollbar */
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:#475569; }
  .card-hl { border-color:#3b82f6 !important; box-shadow:0 0 0 2px rgba(59,130,246,.35), 0 4px 20px rgba(0,0,0,.5) !important; transform:translateY(-1px); transition:border-color .1s, box-shadow .1s, transform .1s; }
  .marker-hl { filter:drop-shadow(0 0 7px #3b82f6) drop-shadow(0 0 3px #60a5fa) !important; transition:filter .1s; }
  .spin { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #selected-addr-bar { border-top:1px solid var(--line); background:var(--bg-2); padding:4px 14px; font-size:11px; color:var(--muted); display:none; }
  #selected-addr-bar span { color:var(--ink-2); font-weight:500; }
</style>
</head>

// ---------- Multi-select component ----------
function setupMultiSelect(wrapperId, triggerId, dropdownId, allLabel, onChange) {
  const trigger = document.getElementById(triggerId);
  const dropdown = document.getElementById(dropdownId);
  const clearBtn = dropdown.querySelector('.ms-clear');
  const searchInput = dropdown.querySelector('.ms-search');

  function getBoxes() { return [...dropdown.querySelectorAll('input[type=checkbox]')]; }
  function getValues() { return getBoxes().filter(b => b.checked).map(b => b.value); }

  function updateTrigger() {
    const vals = getValues();
    trigger.textContent = vals.length === 0 ? allLabel : vals.length === 1 ? vals[0] : vals.length + ' selected';
  }

  function filterItems(q) {
    const ql = q.toLowerCase().trim();
    dropdown.querySelectorAll('.ms-item').forEach(item => {
      const label = item.querySelector('span')?.textContent?.toLowerCase() || '';
      item.style.display = (!ql || label.includes(ql)) ? '' : 'none';
    });
  }

  function openDropdown() {
    document.querySelectorAll('.ms-dropdown.open').forEach(d => { if (d !== dropdown) d.classList.remove('open'); });
    dropdown.classList.add('open');
    trigger.classList.add('active');
    if (searchInput) { searchInput.value = ''; filterItems(''); setTimeout(() => searchInput.focus(), 50); }
  }

  function closeDropdown() {
    dropdown.classList.remove('open');
    trigger.classList.remove('active');
    if (searchInput) { searchInput.value = ''; filterItems(''); }
    if (dropdown._portal) {
      dropdown.style.cssText = '';
      if (dropdown._portalNext) dropdown._portalParent.insertBefore(dropdown, dropdown._portalNext);
      else dropdown._portalParent.appendChild(dropdown);
      dropdown._portal = false;
    }
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    if (dropdown.classList.contains('open')) { closeDropdown(); return; }
    openDropdown();
    // On mobile: move dropdown to body to escape iOS overflow clipping
    if (window.innerWidth <= 640 && !dropdown._portal) {
      dropdown._portalParent = dropdown.parentNode;
      dropdown._portalNext   = dropdown.nextSibling;
      document.body.appendChild(dropdown);
      dropdown._portal = true;
    }
    if (dropdown._portal) {
      const r = trigger.getBoundingClientRect();
      const w = Math.max(r.width, 200);
      let left = Math.min(r.left, window.innerWidth - w - 8);
      left = Math.max(left, 8);
      dropdown.style.position = 'fixed';
      dropdown.style.top    = (r.bottom + 4) + 'px';
      dropdown.style.left   = left + 'px';
      dropdown.style.width  = w + 'px';
      dropdown.style.bottom = 'auto';
      dropdown.style.zIndex = '99999';
    }
  });

  if (searchInput) {
    searchInput.addEventListener('input', e => filterItems(e.target.value));
    searchInput.addEventListener('click', e => e.stopPropagation());
    searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') closeDropdown(); });
  }

  clearBtn.addEventListener('click', e => {
    e.stopPropagation();
    getBoxes().forEach(b => b.checked = false);
    updateTrigger();
    onChange([]);
  });

  // Single delegated listener on the dropdown — handles both static & dynamic items
  dropdown.addEventListener('click', e => {
    e.stopPropagation(); // Always block bubbling so document click doesn't close us
    const item = e.target.closest('.ms-item');
    if (!item) return;
    const box = item.querySelector('input[type=checkbox]');
    if (!box) return;
    if (e.target !== box) box.checked = !box.checked;
    updateTrigger();
    onChange(getValues());
  });

  return { getValues };
}

const map = L.map('map', { zoomControl:true }).setView([39.5,-98.35],4);
const TILE_PROVIDERS = [
  { name:'ArcGIS Dark Gray', url:'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', attribution:'Tiles &copy; Esri', maxZoom:16 },
  { name:'OpenStreetMap', url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', attribution:'&copy; OpenStreetMap', maxZoom:19 },
  { name:'Carto Voyager', url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19 }
];
let activeTileLayer = null;
const mapDiag = document.createElement('div');
mapDiag.style.cssText = 'position:absolute;bottom:6px;left:6px;z-index:1000;background:rgba(10,14,26,.85);color:#cbd5e1;padding:3px 7px;border-radius:5px;font-size:10px;pointer-events:none;';
document.getElementById('map').appendChild(mapDiag);

function tryTile(idx) {
  if (idx >= TILE_PROVIDERS.length) { mapDiag.textContent='All map providers failed'; mapDiag.style.color='#fca5a5'; return; }
  const p = TILE_PROVIDERS[idx];
  if (activeTileLayer) map.removeLayer(activeTileLayer);
  mapDiag.textContent = 'Loading ' + p.name + '…';
  const opts = { attribution:p.attribution, maxZoom:p.maxZoom };
  if (p.subdomains) opts.subdomains = p.subdomains;
  activeTileLayer = L.tileLayer(p.url, opts);
  let settled = false;
  const wd = setTimeout(() => { if (!settled) { settled=true; tryTile(idx+1); } }, 2000);
  activeTileLayer.on('tileerror', () => { if (!settled) { settled=true; clearTimeout(wd); tryTile(idx+1); } });
  activeTileLayer.on('tileload', () => { if (!settled) { settled=true; clearTimeout(wd); mapDiag.textContent=p.name+' ✓'; setTimeout(()=>{mapDiag.style.opacity='0';mapDiag.style.transition='opacity 1s';},1500); } });
  activeTileLayer.addTo(map);
}

async function geocodeCensus(q) {
  try {
    const r=await fetch('https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?benchmark=Public_AR_Current&format=json&address='+encodeURIComponent(q));
    if (!r.ok) return [];
    const j=await r.json();
    return ((j.result&&j.result.addressMatches)||[]).map(m=>({lat:m.coordinates.y,lon:m.coordinates.x,display_name:m.matchedAddress}));
  } catch { return null; }
}
async function geocodePhoton(q) {
  try {
    const r=await fetch('https://photon.komoot.io/api/?limit=5&q='+encodeURIComponent(q));
    if (!r.ok) return [];
    const j=await r.json();
    return (j.features||[]).map(f=>{
      const p=f.properties||{};
      return {lat:f.geometry.coordinates[1],lon:f.geometry.coordinates[0],display_name:[p.name,p.street,p.housenumber,p.city,p.state,p.postcode,p.country].filter(Boolean).join(', ')};
    });
  } catch { return null; }
}
async function geocodeNominatim(q) {
  try {
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&q='+encodeURIComponent(q));
    if (!r.ok) return [];
    const data=await r.json();
    return data.map(d=>{return {lat:parseFloat(d.lat),lon:parseFloat(d.lon),display_name:d.display_name}});
  } catch { return null; }
}
function addressVariants(raw) {
  const v=[raw];
  let q=raw.replace(/\b(suite|ste|space|spc|unit|apt|apartment|#)\s*[A-Za-z0-9-]+/gi,'').replace(/\s{2,}/g,' ').trim();
  if (q!==raw) v.push(q);
  let q2=q.replace(/,\s*[A-Za-z][A-Za-z\s&.'\-]*Mall\b/gi,',').replace(/,\s*[A-Za-z][A-Za-z\s&.'\-]*(Plaza|Center|Centre|Shopping)\b/gi,',').replace(/\s{2,}/g,' ').replace(/,\s*,/g,',').trim();
  if (q2&&q2!==q) v.push(q2);
  const zip=q.match(/\b\d{5}\b/);
  if (zip) v.push(zip[0]);
  return v;
}
async function geocodeAny(q) {
  if (/^-?\d+\.?\d*\s*,\s*-?\d+\.?\d*$/.test(q)) {
    const [la,lo]=q.split(',').map(s=>parseFloat(s.trim()));
    if (!isNaN(la)&&!isNaN(lo)) return [{lat:la,lon:lo,display_name:`Custom point (${la},${lo})`}];
  }
  for (const variant of addressVariants(q)) {
    let res=await geocodeCensus(variant);
    if (res&&res.length) return res;
    res=await geocodePhoton(variant);
    if (res&&res.length) return res;
    res=await geocodeNominatim(variant);
    if (res&&res.length) return res;
  }
  return [];
}

// ---------- Distance ----------
// ── SA address fuzzy match ────────────────────────────────────────────────────
function normAddr(s) {
  return String(s||'').toLowerCase()
    .replace(/(street|st|avenue|ave|boulevard|blvd|road|rd|drive|dr|lane|ln|way|wy|court|ct|circle|cir)/g, '')
    .replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
}
function addrLocationMatch(searchedAddr, saAddr) {
  if (!searchedAddr || !saAddr) return false;
  const a = normAddr(searchedAddr);
  const b = normAddr(saAddr);
  if (!a || !b) return false;
  // Match if they share the same leading street number + first word of street name
  const aTokens = a.split(' ');
  const bTokens = b.split(' ');
  if (aTokens[0] === bTokens[0] && aTokens[1] && bTokens[1] && aTokens[1] === bTokens[1]) return true;
  // Or if one contains the other (short addresses)
  if (a.length > 6 && b.includes(a.slice(0,Math.min(a.length,12)))) return true;
  if (b.length > 6 && a.includes(b.slice(0,Math.min(b.length,12)))) return true;
  return false;
}

function estDriveTime(miles) {
  if (!miles && miles !== 0) return '';
  const mph = miles < 5 ? 25 : miles < 25 ? 40 : miles < 100 ? 55 : 65;
  const mins = Math.round((miles / mph) * 60);
  if (mins < 60) return `~${mins} min`;
  const h = Math.floor(mins/60), m = mins % 60;
  return m > 0 ? `~${h}h ${m}m` : `~${h}h`;
}

function haversineMiles(lat1,lng1,lat2,lng2) {
  const R=3958.8, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

// ---------- Ranking score ----------
// Lower score = better rank
// Priority 1: Self Managed (sm=1 gets bonus -10000)
// Priority 2: Account Status (Compliance Approved=0, Needs Approval=1, Pending Status=2, Do Not Use=3)
// Priority 3: Distance (0-100 miles normalized)
// Priority 4: Alert Severity (no alerts=0, caution only=0.1, has severe=0.2)
const STATUS_RANK = {'Compliance Approved':0,'Needs Approval':1,'Pending Status':2,'Do Not Use':3};

function rankScore(v) {
  const smBonus = v.sm ? -10000 : 0;
  const statusScore = (STATUS_RANK[v.s] ?? 2) * 1000;
  const distScore = v._dist ?? 999;
  const severeCount = v.al.filter(a=>a.s===1).length;
  const cautionCount = v.al.filter(a=>a.s===2).length;
  const alertScore = severeCount > 0 ? 0.2 : cautionCount > 0 ? 0.1 : 0;
  const saBonus = (() => {
    if (!v._saMatches || !v._saMatches.length) return 0;
    const hasTodayLoc  = v._saLocationMatch && v._saMatches.some(s=>s._sameDay&&(s._saDist<=0.15||(s._saDist<=0.75&&addrLocationMatch(workOrder&&workOrder._addr||'',s.addr))));
    const hasTodayArea = !hasTodayLoc && v._saMatches.some(s=>s._sameDay);
    const hasFutureLoc = !hasTodayLoc && v._saLocationMatch;
    if (hasTodayLoc)  return -7000;
    if (hasTodayArea) return -3000;
    if (hasFutureLoc) return -4000;
    return -1500;
  })();
  return smBonus + statusScore + distScore + alertScore + saBonus;
}

// ---------- Filter + Rank ----------
function vendorMetrics(v) {
  const wo90=v.wo.filter(w=>w.d&&new Date(w.d)>=NINETY_AGO).length;
  const severeCount=v.al.filter(a=>a.s===1).length;
  const cautionCount=v.al.filter(a=>a.s===2).length;
  const latestDate=v.wo[0]?.d?new Date(v.wo[0].d):null;
  return {wo90,severeCount,cautionCount,latestDate};
}

// ---------- Fuzzy vendor name search ----------
function fuzzyScore(q, name) {
  if (!q) return 0;
  const ql = q.toLowerCase().trim();
  const nl = name.toLowerCase();
  if (nl === ql) return 1000;
  if (nl.startsWith(ql)) return 800;
  if (nl.includes(ql)) return 600;
  const tokens = ql.split(/\s+/).filter(Boolean);
  if (tokens.length > 1) {
    const allMatch = tokens.every(t => nl.includes(t));
    if (allMatch) return 400;
    const matchCount = tokens.filter(t => nl.includes(t)).length;
    if (matchCount > 0) return Math.round(200 * matchCount / tokens.length);
  }
  // Initialism: "abc" → matches "A Better Company"
  const words = nl.split(/\s+/);
  const initials = words.map(w => w[0] || '').join('');
  if (initials.startsWith(ql) || initials.includes(ql)) return 80;
  // Partial char sequence
  let qi = 0;
  for (let ci = 0; ci < nl.length && qi < ql.length; ci++) {
    if (nl[ci] === ql[qi]) qi++;
  }
  if (qi === ql.length && ql.length >= 3) return 30;
  return 0;
}

function getVNSResults(q) {
  if (!q || q.trim().length < 1) return [];
  const scored = VENDORS.map(v => ({ v, score: fuzzyScore(q, v.n) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);
  return scored.slice(0, 8);
}

function applyFilters() {
  if (!workOrder && !state.vendorSearch) { currentResults=[]; showCount=25; render(); return; }

  // Vendor name search mode: bypass distance filter, show all matching vendors
  if (state.vendorSearch) {
    let pool = VENDORS.map(v => {
      if(!workOrder) return {...v, _dist:null};
      let d=haversineMiles(workOrder.lat,workOrder.lng,v.lat,v.lng);
      if(v.locs&&v.locs.length){for(const l of v.locs){const ld=haversineMiles(workOrder.lat,workOrder.lng,l.lat,l.lng);if(ld<d)d=ld;}}
      return {...v, _dist:d};
    });
    pool = pool.filter(v => fuzzyScore(state.vendorSearch, v.n) > 0);
    // Apply non-distance filters still
    if (state.trades.length) pool=pool.filter(v=>state.trades.some(t=>v.tr.includes(t)));
    if (state.statuses.length) pool=pool.filter(v=>state.statuses.includes(v.s));
    if (state.alerts.length) {
      pool=pool.filter(v=>state.alerts.some(af=>{
        if (af==='none') return v.al.length===0;
        if (af==='cautiononly') return !v.al.some(a=>a.s===1);
        if (af==='severe') return v.al.some(a=>a.s===1);
        if (af==='info') return v.al.some(a=>a.s===3);
        return true;
      }));
    }
    if (state.activity==='90') pool=pool.filter(v=>vendorMetrics(v).wo90>0);
    else if (state.activity==='ever') pool=pool.filter(v=>v.wo.length>0);
    if (state.newVendor==='new') { const now=new Date(); pool=pool.filter(v=>v.vc&&(now-new Date(v.vc))/(864e5)<=180); }
    pool.sort((a,b) => fuzzyScore(state.vendorSearch,b.n) - fuzzyScore(state.vendorSearch,a.n));
    currentResults=pool; showCount=25; render(); return;
  }

  let pool=VENDORS.slice();

  // Trades (multi - match any selected)
  if (state.trades.length) pool=pool.filter(v=>state.trades.some(t=>v.tr.includes(t)));

  // Account Status (multi)
  if (state.statuses.length) pool=pool.filter(v=>state.statuses.includes(v.s));

  // Alerts (multi - OR logic: if any alert filter matches, include)
  if (state.alerts.length) {
    pool=pool.filter(v=>{
      return state.alerts.some(af=>{
        if (af==='none') return v.al.length===0;
        if (af==='cautiononly') return !v.al.some(a=>a.s===1);
        if (af==='severe') return v.al.some(a=>a.s===1);
        if (af==='info') return v.al.some(a=>a.s===3);
        return true;
      });
    });
  }

  // Activity
  if (state.activity==='90') pool=pool.filter(v=>vendorMetrics(v).wo90>0);
  else if (state.activity==='ever') pool=pool.filter(v=>v.wo.length>0);

  // New Vendor
  if (state.newVendor==='new') {
    const now=new Date();
    pool=pool.filter(v=>v.vc&&(now-new Date(v.vc))/(864e5)<=180);
  }

  // Distance
  pool=pool.map(v=>{
    let d=haversineMiles(workOrder.lat,workOrder.lng,v.lat,v.lng);
    if(v.locs&&v.locs.length){for(const l of v.locs){const ld=haversineMiles(workOrder.lat,workOrder.lng,l.lat,l.lng);if(ld<d)d=ld;}}
    return {...v,_dist:d};
  });
  if (state.radius<9999) pool=pool.filter(v=>v._dist<=state.radius);

  // SA matching — attach _saMatches and _saLocationMatch to each vendor
  const etaD = state.etaDate || new Date().toISOString().slice(0,10);
  pool = pool.map(v => {
    if (!v.sa || !v.sa.length) return v;
    const matches = v.sa.filter(s => {
      if (s.sd > etaD) return false;
      if (!workOrder) return false;
      const d = haversineMiles(workOrder.lat, workOrder.lng, s.lat, s.lng);
      if (d > state.saRadius) return false;
      s._saDist = d;
      s._tradeMatch = !state.trades.length || state.trades.includes(s.tr);
      // Flag same-day vs upcoming
      const _today = (function(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
      s._sameDay = (s.sd === _today);
      return true;
    });
    if (!matches.length) return v;
    const locMatch = matches.filter(s => {
      if (s._saDist <= 0.15) return true;
      // Fallback: slightly further but address text matches
      if (s._saDist <= 0.75 && workOrder._addr && addrLocationMatch(workOrder._addr, s.addr)) return true;
      return false;
    });
    return { ...v, _saMatches: matches, _saLocationMatch: locMatch.length > 0, _saLocMatches: locMatch };
  });

  // SA filter
  if (state.saFilter === 'today') pool = pool.filter(v => v._saMatches && v._saMatches.some(s=>s._sameDay));
  else if (state.saFilter === 'any') pool = pool.filter(v => v._saMatches && v._saMatches.length > 0);
  else if (state.saFilter === 'loc') pool = pool.filter(v => v._saLocationMatch);

  // Sort
  if (state.sort==='score') {
    pool.sort((a,b)=>rankScore(a)-rankScore(b));
  } else if (state.sort==='distance') {
    pool.sort((a,b)=>a._dist-b._dist);
  } else if (state.sort==='recent') {
    pool.sort((a,b)=>(b.wo[0]?.d||'0').localeCompare(a.wo[0]?.d||'0'));
  } else if (state.sort==='wocount') {
    pool.sort((a,b)=>b.wo.length-a.wo.length);
  } else if (state.sort==='name') {
    pool.sort((a,b)=>a.n.localeCompare(b.n));
  }

  currentResults=pool; showCount=25; render();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}
function fmtMoney(amount,cur) {
  if (!amount) return '—';
  const sym=cur==='CAD'?'CA$':'$';
  return sym+amount.toFixed(2);
}
function escapeHtml(s) {
  const _em={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return String(s||'').replace(/[&<>"']/g,c=>_em[c]);
}

function statusPill(s) {
  if (s==='Compliance Approved') return '<span class="pill pill-green">✓ Compliance Approved</span>';
  if (s==='Needs Approval') return '<span class="pill pill-yellow">⏳ Needs Approval</span>';
  if (s==='Pending Status') return '<span class="pill pill-orange">? Pending Status</span>';
  if (s==='Do Not Use') return '<span class="pill pill-red">✕ Do Not Use</span>';
  return '<span class="pill pill-muted">' + escapeHtml(s) + '</span>';
}

        &nbsp;·&nbsp;<span style="font-weight:600;color:var(--ink-2);">Labor:</span> <span style="color:var(--ink-strong);">${fmtMoney(v.lr,v.lc)}/hr</span>
        &nbsp;·&nbsp;<span style="font-weight:600;color:var(--ink-2);">Trip:</span> <span style="color:var(--ink-strong);">${fmtMoney(v.tc,v.tcc)}</span>
      </div>
      <div style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        <span style="font-weight:600;color:var(--ink-2);">Address:</span> ${escapeHtml(v.ad||'—')}
        ${v.e?`&nbsp;·&nbsp;<span style="font-weight:600;color:var(--ink-2);">Email:</span> <a href="mailto:${escapeHtml(v.e)}" style="color:#60a5fa;">${escapeHtml(v.e)}</a>`:''}
      </div>
      ${sfLink?`<div><a href="${sfLink}" target="_blank" rel="noopener" style="color:#60a5fa;font-size:12px;font-weight:500;text-decoration:underline;">${escapeHtml(v.n)} Salesforce Page</a></div>`:''}
    </div>
  </div>`;
}

function render() {
  const listEl=document.getElementById('vendor-list');
  const total=currentResults.length;
  const showing=currentResults.slice(0,showCount);

  document.getElementById('result-count').textContent=total.toLocaleString()+' vendors';
  document.getElementById('results-title').textContent=workOrder?(total===0?'No vendors match':'Vendors near store'):''

  if (!workOrder && !state.vendorSearch) {
    listEl.innerHTML=`<div class="card" style="padding:32px;text-align:center;color:var(--muted);grid-column:1/-1;"><div style="font-size:2.5rem;margin-bottom:8px;">📍</div><div style="font-weight:600;font-size:13px;color:var(--ink-strong);margin-bottom:4px;">Enter a store address or search by vendor name</div><div style="font-size:11px;">Type the store address above and press Enter, or search for a vendor by name.</div></div>`;
    document.getElementById('load-more-wrap').classList.add('hidden');
    clearVendorMarkers(); return;
  }
  if (total===0) {
    listEl.innerHTML=`<div class="card" style="padding:24px;text-align:center;color:var(--muted);grid-column:1/-1;"><div style="font-weight:600;margin-bottom:4px;">No vendors match</div><div style="font-size:11px;">Try widening the radius or relaxing filters.</div></div>`;
    document.getElementById('load-more-wrap').classList.add('hidden');
    clearVendorMarkers(); return;
  }

  // SA Coverage Gap Indicator
  if (workOrder && state.etaDate) {
    const hasSAMatch = showing.some(v => v._saMatches && v._saMatches.length > 0);
    if (!hasSAMatch) {
      const _today = (function(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
      const extDate = new Date(); extDate.setDate(extDate.getDate()+30);
      const extDateStr = extDate.getFullYear()+'-'+String(extDate.getMonth()+1).padStart(2,'0')+'-'+String(extDate.getDate()).padStart(2,'0');
      // Search all vendors for nearest SA within 2× radius + 30 days
      let nearest = null, nearestDist = Infinity;
      VENDORS.forEach(v => {
        (v.sa||[]).forEach(s => {
          if (s.sd < _today || s.sd > extDateStr) return;
          const d = haversineMiles(workOrder.lat, workOrder.lng, s.lat, s.lng);
          if (d < nearestDist) { nearestDist=d; nearest={v,s,d}; }
        });
      });
      const nearestHtml = nearest
        ? `<div class="gap-nearest">Nearest upcoming SA: <strong>${nearest.d.toFixed(1)} mi (${estDriveTime(nearest.d)})</strong> on ${nearest.s.sd} — ${escapeHtml(nearest.v.n)} at ${escapeHtml(nearest.s.store)}</div>`
        : `<div class="gap-nearest">No upcoming service appointments found within 30 days.</div>`;
      const banner = `<div class="sa-gap-banner"><div class="gap-title">📭 No vendors scheduled in this area within ${state.saRadius} mi before ${state.etaDate}</div>${nearestHtml}</div>`;
      listEl.innerHTML = banner + showing.map((v,i)=>renderCard(v,i+1)).join('');
    } else {
      listEl.innerHTML = showing.map((v,i)=>renderCard(v,i+1)).join('');
    }
  } else {
    listEl.innerHTML = showing.map((v,i)=>renderCard(v,i+1)).join('');
  }
  document.getElementById('load-more-wrap').classList.toggle('hidden',showing.length>=total);

  clearVendorMarkers();
  vendorMarkerMap = {};
  const cap=Math.min(showing.length,100);
  for (let i=0;i<cap;i++) {
    const v=showing[i];
    const vid=v.id||v.n;
    const popupBase=`<b>${escapeHtml(v.n)}</b><br>${v.tr.join(', ')||'—'}`;
    const m=L.marker([v.lat,v.lng],{icon:vendorIcon(v,i+1),zIndexOffset:500-i})
      .bindPopup(popupBase+(v._dist!=null?'<br>'+v._dist.toFixed(1)+' mi  '+estDriveTime(v._dist):'')+(v.locs&&v.locs.length?'<br><span style="font-size:10px;color:#94a3b8;">'+v.locs.length+' additional location(s)</span>':''));
    m.addTo(map); vendorMarkers.push(m);
    if(!vendorMarkerMap[vid]) vendorMarkerMap[vid]=[];
    vendorMarkerMap[vid].push(m);
    m.on('mouseover', ()=>highlightVendor(vid));
    m.on('mouseout',  ()=>clearHighlight(vid));
    // Extra location markers
    if(v.locs&&v.locs.length){
      for(const loc of v.locs){
        const locDist=workOrder?haversineMiles(workOrder.lat,workOrder.lng,loc.lat,loc.lng):null;
        const altIcon=L.divIcon({className:'',html:`<div style="background:#1c2333;border:2px dashed #3b82f6;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#93c5fd;">+</div>`,iconSize:[20,20],iconAnchor:[10,10]});
        const m2=L.marker([loc.lat,loc.lng],{icon:altIcon,zIndexOffset:300-i})
          .bindPopup(`<b>${escapeHtml(v.n)}</b><br><span style="font-size:10px;color:#94a3b8;">Additional Location</span>${loc.addr?'<br>'+loc.addr:''}${locDist!=null?'<br>'+locDist.toFixed(1)+' mi':''}`);
        m2.addTo(map); vendorMarkers.push(m2);
        vendorMarkerMap[vid].push(m2);
        m2.on('mouseover', ()=>highlightVendor(vid));
        m2.on('mouseout',  ()=>clearHighlight(vid));
      }
    }
  }
  if (window.innerWidth <= 640) { setTimeout(() => map.invalidateSize(), 200); }
  if (vendorMarkers.length>0) {
    if (state.vendorSearch && !workOrder) {
      // Name search with no address: fit to matched vendors only
      const grp=L.featureGroup(vendorMarkers.slice(0,10));
      map.fitBounds(grp.getBounds().pad(0.3),{maxZoom:14});
    } else {
      const grp=L.featureGroup([...vendorMarkers.slice(0,10),workOrderMarker].filter(Boolean));
      map.fitBounds(grp.getBounds().pad(0.2),{maxZoom:12});
    }
  }
}

// ---------- Hover highlight (card ↔ map marker) ----------
function highlightVendor(vid) {
  const card = document.querySelector(`[data-vid="${vid}"]`);
  if (card) {
    card.classList.add('card-hl');
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
  (vendorMarkerMap[vid]||[]).forEach(m => {
    const el = m.getElement();
    if (el) { el.classList.add('marker-hl'); m.setZIndexOffset(2000); }
  });
}
function clearHighlight(vid) {
  const card = document.querySelector(`[data-vid="${vid}"]`);
  if (card) card.classList.remove('card-hl');
  (vendorMarkerMap[vid]||[]).forEach(m => {
    const el = m.getElement();
    if (el) { el.classList.remove('marker-hl'); m.setZIndexOffset(500); }
  });
}

// Card hover delegation
const vendorListEl = document.getElementById('vendor-list');
vendorListEl.addEventListener('mouseover', e => {
  const card = e.target.closest('[data-vid]');
  if (!card || card.dataset._hovering) return;
  card.dataset._hovering = '1';
  highlightVendor(card.dataset.vid);
});
vendorListEl.addEventListener('mouseout', e => {
  const card = e.target.closest('[data-vid]');
  if (!card) return;
  if (card.contains(e.relatedTarget)) return;
  delete card.dataset._hovering;
  clearHighlight(card.dataset.vid);
});

document.getElementById('load-more').addEventListener('click',()=>{showCount+=25;render();});

// ---------- Vendor Name Search (VNS) ----------
(function() {
  const vnsInput = document.getElementById('vns-input');
  const vnsDrop  = document.getElementById('vns-dropdown');
  const vnsClear = document.getElementById('vns-clear-btn');
  let vnsTimer = null;
  let vnsActiveIdx = -1;
  let vnsCommitting = false; // guard against re-open during commit

  function vnsShow(items) {
    if (!items.length) { vnsHide(); return; }
    vnsDrop.innerHTML = items.map((x,i) =>
      `<div class="vns-match-item${i===vnsActiveIdx?' vns-active':''}" data-idx="${i}">
        <span class="vns-match-name">${escapeHtml(x.v.n)}</span>
        <span class="vns-match-sub">${x.v.tr.slice(0,2).join(', ')||'—'} · ${x.v.s}</span>
      </div>`
    ).join('');
    vnsDrop.style.display = 'block';
  }

  function vnsHide() {
    vnsDrop.style.display = 'none';
    vnsDrop.innerHTML = '';
    vnsActiveIdx = -1;
  }

  function selectVNSVendor(vendor) {
    vnsCommitting = true;
    clearTimeout(vnsTimer);
    vnsHide();
    vnsInput.value = vendor.n;
    state.vendorSearch = vendor.n;
    vnsClear.style.display = '';
    applyFilters();
    setTimeout(() => { map.setView([vendor.lat, vendor.lng], 13); }, 100);
    setTimeout(() => { vnsCommitting = false; }, 300);
  }

  vnsInput.addEventListener('input', () => {
    if (vnsCommitting) return;
    const q = vnsInput.value.trim();
    vnsActiveIdx = -1;
    clearTimeout(vnsTimer);
    if (!q) {
      state.vendorSearch = '';
      vnsClear.style.display = 'none';
      vnsHide();
      applyFilters();
      return;
    }
    vnsTimer = setTimeout(() => {
      if (vnsCommitting) return;
      vnsShow(getVNSResults(q));
    }, 150);
  });

  vnsInput.addEventListener('keydown', e => {
    const items = vnsDrop.querySelectorAll('.vns-match-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      vnsActiveIdx = Math.min(vnsActiveIdx + 1, items.length - 1);
      items.forEach((el,i) => el.classList.toggle('vns-active', i===vnsActiveIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      vnsActiveIdx = Math.max(vnsActiveIdx - 1, -1);
      items.forEach((el,i) => el.classList.toggle('vns-active', i===vnsActiveIdx));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(vnsTimer);
      const q = vnsInput.value.trim();
      if (vnsActiveIdx >= 0 && items[vnsActiveIdx]) {
        const idx = parseInt(items[vnsActiveIdx].dataset.idx);
        const matches = getVNSResults(q);
        if (matches[idx]) { selectVNSVendor(matches[idx].v); return; }
      }
      if (q) {
        vnsCommitting = true;
        vnsHide();
        state.vendorSearch = q;
        vnsClear.style.display = '';
        applyFilters();
        setTimeout(() => { vnsCommitting = false; }, 300);
      }
    } else if (e.key === 'Escape') {
      vnsHide();
    }
  });

  vnsDrop.addEventListener('mousedown', e => {
    const item = e.target.closest('.vns-match-item');
    if (!item) return;
    e.preventDefault();
    const idx = parseInt(item.dataset.idx);
    const matches = getVNSResults(vnsInput.value.trim());
    if (matches[idx]) selectVNSVendor(matches[idx].v);
  });

  vnsClear.addEventListener('click', () => {
    vnsInput.value = '';
    state.vendorSearch = '';
    vnsClear.style.display = 'none';
    vnsHide();
    applyFilters();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#vns-input') && !e.target.closest('#vns-dropdown')) {
      vnsHide();
    }
  });
})();

// ── Data loading ─────────────────────────────────────────────────────────────
function showDataLoading() {
  const listEl = document.getElementById('vendor-list');
  listEl.innerHTML = `<div class="card" style="padding:32px;text-align:center;color:var(--muted);grid-column:1/-1;">
    <div style="font-size:2rem;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block;">⟳</div>
    <div style="font-weight:600;font-size:13px;color:var(--ink-strong);margin-bottom:4px;">Loading vendor data…</div>
    <div style="font-size:11px;">Fetching latest data from server</div>
  </div>`;
}

function initApp() {
  // Check for URL parameters (auto-fill from Salesforce)
  const _urlParams = new URLSearchParams(window.location.search);
  const _urlAddress = _urlParams.get('address') || _urlParams.get('addr');
  const _urlEta     = _urlParams.get('eta');
  const _urlTrade   = _urlParams.get('trade');

  if (_urlEta) {
    const etaInput = document.getElementById('eta-date-input');
    if (etaInput) { etaInput.value = _urlEta; state.etaDate = _urlEta; }
  }
  if (_urlTrade) {
    // Normalize incoming trade value to match tool's trade names
    const TRADE_URL_NORM = {
      'handyman / general maintenance technician': 'Handyman',
      'handyman / general maintenance': 'Handyman',
      'handyman': 'Handyman',
      'hvac-r': 'HVAC',
      'hvac/r': 'HVAC',
      'hvac': 'HVAC',
      'heating and cooling': 'HVAC',
      'electrical': 'Electrician',
      'electrician': 'Electrician',
      'contractor/ construction': 'Construction',
      'contractor/construction': 'Construction',
      'contractor / construction / general contracting': 'Construction',
      'construction': 'Construction',
      'gates glass & doors': 'Gates, Glass & Doors',
      'gates glass and doors': 'Gates, Glass & Doors',
      'gates, glass & doors': 'Gates, Glass & Doors',
      'glass & doors': 'Gates, Glass & Doors',
      'painting': 'Painting',
      'painter': 'Painting',
      'paint': 'Painting',
      'janitorial': 'Janitorial/Cleaning Services',
      'janitorial/cleaning': 'Janitorial/Cleaning Services',
      'janitorial/cleaning services': 'Janitorial/Cleaning Services',
      'cleaning': 'Janitorial/Cleaning Services',
      'lightning': 'Lighting',
      'lighting': 'Lighting',
      'signage': 'Signage & External Lighting',
      'signage & external lighting': 'Signage & External Lighting',
      'speciality equipment': 'Specialty Equipment',
      'specialty equipment': 'Specialty Equipment',
      'other / administrative': 'Other',
      'other': 'Other',
      'plumbing': 'Plumbing',
      'roofing': 'Roofing',
      'landscaping': 'Landscaping',
      'locksmith': 'Locksmith',
      'pest control': 'Pest Control',
      'flooring': 'Flooring',
      'carpentry': 'Carpentry',
      'fire services': 'Fire Services',
      'security services': 'Security Services',
      'appliances': 'Appliances',
      'asphalt & paving': 'Asphalt & Paving',
      'asphalt and paving': 'Asphalt & Paving',
      'paving': 'Asphalt & Paving',
      'masonry': 'Masonry',
      'refrigeration': 'Refrigeration',
      'snow removal': 'Snow Removal',
      'snow': 'Snow Removal',
      'remediation': 'Remediation',
      'backflow testing': 'Backflow Testing',
      'backflow': 'Backflow Testing',
      'railing / fences': 'Railing / Fences',
      'railing/fences': 'Railing / Fences',
      'fencing': 'Railing / Fences',
      'dumpster & waste': 'Dumpster & Waste',
      'dumpster': 'Dumpster & Waste',
      'waste': 'Dumpster & Waste',
      'automotive': 'Automotive',
      'awnings': 'Awnings',
      'rental equipment': 'Rental Equipment',
    };
    const normalizedTrade = TRADE_URL_NORM[_urlTrade.toLowerCase().trim()] || _urlTrade;
    window._pendingTrade = normalizedTrade;
  }
  // Clean Salesforce address artifacts before geocoding
  function cleanSFAddress(addr) {
    return addr
      .replace(/\s+#\s+[A-Z]+\b/g, '')   // remove # ROADUNIT, # SUITE, # APT etc.
      .replace(/\s*\bUS\b\s*$/i, '')      // remove trailing country code
      .replace(/\s*\bUNITED STATES\b\s*$/i, '')
      .replace(/\s{2,}/g, ' ')              // collapse multiple spaces
      .trim();
  }

  if (_urlAddress) {
    const addrInput = document.getElementById('address-input');
    if (addrInput) {
      const _cleanedAddr = cleanSFAddress(_urlAddress);
      addrInput.value = _cleanedAddr;
      // Trigger geocode after a short delay so the app is fully ready
      setTimeout(async () => {
        const res = await geocodeAny(_cleanedAddr);
        if (res.length) {
          selectAddress(res[0]);
        } else {
          addrInput.placeholder = 'Could not geocode address from URL — try manually';
        }
      }, 400);
    }
  }

  // Populate trade list now that VENDORS is loaded
  const tdd = document.getElementById('trade-dropdown');
  const allTrades = [...new Set(VENDORS.flatMap(v=>v.tr))].sort();
  const existingSearch = tdd.querySelector('.ms-search-wrap');
  const existingClear = tdd.querySelector('.ms-clear');
  tdd.innerHTML = '';
  if (existingSearch) tdd.appendChild(existingSearch);
  allTrades.forEach(t => {
    const d = document.createElement('div');
    d.className = 'ms-item';
    d.innerHTML = `<input type="checkbox" value="${t}"/><span>${t}</span>`;
    tdd.appendChild(d);
  });
  if (existingClear) tdd.appendChild(existingClear);

  // Update stats
  document.getElementById('data-stats').innerHTML =
    `<span>${VENDORS.length.toLocaleString()} vendors loaded</span>`;

  // Apply pending trade from URL param
  if (window._pendingTrade) {
    const tradeBoxes = document.querySelectorAll('#trade-dropdown input[type=checkbox]');
    tradeBoxes.forEach(b => { if (b.value === window._pendingTrade) b.checked = true; });
    state.trades = [window._pendingTrade];
    const tradeTrigger = document.getElementById('trade-trigger');
    if (tradeTrigger) tradeTrigger.textContent = window._pendingTrade;
    window._pendingTrade = null;
  }

  applyFilters();
}

showDataLoading();
fetch(APPS_SCRIPT_URL)
  .then(r => r.json())
  .then(data => {
    VENDORS = data;
    initApp();
  })
  .catch(err => {
    document.getElementById('vendor-list').innerHTML = `<div class="card" style="padding:24px;text-align:center;color:var(--muted);grid-column:1/-1;">
      <div style="font-weight:600;color:#f87171;margin-bottom:4px;">⚠ Failed to load vendor data</div>
      <div style="font-size:11px;">Check your internet connection and try refreshing.<br>Error: ${err.message}</div>
    </div>`;
  });

// ── Mobile: dynamic header height padding ────────────────────────────────────────
function fixMobilePadding() {
  if (window.innerWidth <= 640) {
    const h = document.querySelector('header.topbar');
    if (h) document.body.style.paddingTop = h.offsetHeight + 'px';
  } else {
    document.body.style.paddingTop = '';
  }
}
window.addEventListener('resize', fixMobilePadding);
// Run after fonts/images settle
setTimeout(fixMobilePadding, 100);
setTimeout(fixMobilePadding, 600);

// ── Map collapse toggle ────────────────────────────────────────────────────────
const mapCollapseBtn = document.getElementById('map-collapse-btn');
const layoutRootEl   = document.getElementById('layout-root');
let mapVisible = localStorage.getItem('mapVisible') !== 'false';

function applyMapVisibility() {
  layoutRootEl.classList.toggle('map-collapsed', !mapVisible);
  mapCollapseBtn.innerHTML = mapVisible ? '🗺 Hide Map' : '🗺 Show Map';
  mapCollapseBtn.title = mapVisible ? 'Click to collapse map' : 'Click to expand map';
  // Multiple calls needed on Android to ensure map re-renders correctly
  [100, 320, 600, 1000].forEach(d => setTimeout(() => map.invalidateSize(), d));
}

mapCollapseBtn.addEventListener('click', () => {
  mapVisible = !mapVisible;
  localStorage.setItem('mapVisible', mapVisible);
  applyMapVisibility();
});

applyMapVisibility();

// ── Light / Dark mode toggle ───────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-toggle-btn');
let isDark = localStorage.getItem('theme') !== 'light';

function applyTheme(dark) {
  isDark = dark;
  document.body.classList.toggle('light-mode', !dark);
  themeBtn.textContent = dark ? '☀ Light Mode' : '🌙 Dark Mode';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}

themeBtn.addEventListener('click', () => applyTheme(!isDark));
applyTheme(isDark);
